name: 🏗️ Build and store
run-name: 🏗️ Build and store version ${{ (github.event_name == 'push' || github.event_name == 'release') && github.ref_name || github.sha }}

on:
  release:
    types:
      - prereleased
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ (github.event_name == 'push' || github.event_name == 'release') && github.ref_name || github.sha }}
  REPO_URL: https://github.com/${{ github.repository }}
jobs:
  build:
    name: 🏗️ Build the image
    runs-on: ubuntu-latest
    steps:
      - name: 📁 Checkout
        uses: actions/checkout@v3

      - name: 🎫 Get image name
        id: get-image-name
        run: |
          echo "name=ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🧹 Free some space for docker
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: 🏗️ Build the image
        id: build
        env:
          # Tag depends on the trigger that called this workflow [ manual | merge | release ]
          #   manual  ->  <image-name>:<ref-hash>
          #   merge   ->  <image-name>:<ref-name>
          #   release ->  <image-name>:<tag>
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_NAME_BASELINE: ${{ steps.get-image-name.outputs.name }}/baseline
          IMAGE_NAME_CONTROLNET: ${{ steps.get-image-name.outputs.name }}/controlnet
          IMAGE_NAME_BLIP: ${{ steps.get-image-name.outputs.name }}/blip
          IMAGE_NAME_MLFLOW: ${{ steps.get-image-name.outputs.name }}/mlflow
          IMAGE_NAME_DEEPF: ${{ steps.get-image-name.outputs.name }}/deepfloyd
          IMAGE_NAME_SDXL: ${{ steps.get-image-name.outputs.name }}/sdxl
          IMAGE_NAME_EVAL: ${{ steps.get-image-name.outputs.name }}/eval
          IMAGE_NAME_GAN: ${{ steps.get-image-name.outputs.name }}/gan

        run: docker compose build baseline_model

      - name: 🔒 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.triggering_actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Store the baseline model image
        run: docker push ${{ steps.get-image-name.outputs.name }}/baseline:${{ env.IMAGE_TAG }}

      # - name: 📦 Store the controlnet finetuning image
      #   run: docker push ${{ steps.get-image-name.outputs.name }}/controlnet:${{ env.IMAGE_TAG }}

      # - name: 📦 Store the blip image
      #   run: docker push ${{ steps.get-image-name.outputs.name }}/blip:${{ env.IMAGE_TAG }}

      # - name: 📦 Store the mlflow image
      #   run: docker push ${{ steps.get-image-name.outputs.name }}/mlflow:${{ env.IMAGE_TAG }}

      # - name: 📦 Store the deepfloyd image
      #   run: docker push ${{ steps.get-image-name.outputs.name }}/deepfloyd:${{ env.IMAGE_TAG }}

      # - name: 📦 Store the sdxl image
      #   run: docker push ${{ steps.get-image-name.outputs.name }}/sdxl:${{ env.IMAGE_TAG }}

      # - name: 📦 Store the model evaluation image
      #   run: docker push ${{ steps.get-image-name.outputs.name }}/eval:${{ env.IMAGE_TAG }}

      # - name: 📦 Store the cyclegan turbo image
      #   run: docker push ${{ steps.get-image-name.outputs.name }}/gan:${{ env.IMAGE_TAG }}

      - name: 📜 Summary
        run: |
          echo "### \`${{ steps.get-image-name.outputs.name }}\` built and published" >> "$GITHUB_STEP_SUMMARY"
          echo "To use it you can run: \`docker pull ${{ steps.get-image-name.outputs.name }}:${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
