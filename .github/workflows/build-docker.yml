name: 🏗️ Build and store
run-name: 🏗️ Build and store version ${{ (github.event_name == 'push' || github.event_name == 'release') && github.ref_name || github.sha }}

on:
  release:
    types: [prereleased]
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ (github.event_name == 'push' || github.event_name == 'release') && github.ref_name || github.sha }}
  REPO_URL: https://github.com/${{ github.repository }}

jobs:
  build:
    name: 🏗️ Build & push ${{ matrix.image_suffix }}
    runs-on: large-runner-ubuntu
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: baseline_model
            image_suffix: baseline
          - service: controlnet_finetuning
            image_suffix: controlnet
          - service: blip_caption
            image_suffix: blip
          - service: mlflow
            image_suffix: mlflow
          - service: deepfloyd
            image_suffix: deepfloyd
          - service: sdxl
            image_suffix: sdxl
          - service: model_eval
            image_suffix: eval
          - service: gan
            image_suffix: gan

    steps:
      - name: 📁 Checkout
        uses: actions/checkout@v3

      - name: 🔒 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎫 Get image name
        id: get-image-name
        run: |
          # outputs base name like "ghcr.io/org/MY_PACKAGE_NAME"
          echo "name=ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Optional: QEMU for multi-arch builds
      # - name: ⚙️ Set up QEMU
      #   uses: docker/setup-qemu-action@v3

      - name: 🚀 Build & push ${{ matrix.image_suffix }} image
        uses: docker/bake-action@v6
        with:
          source: .
          push: true
          targets: ${{ matrix.service }}
          set: |
            *.tags=${{ steps.get-image-name.outputs.name }}/${{ matrix.image_suffix }}:${{ env.IMAGE_TAG }}

      - name: 📜 Summary for ${{ matrix.image_suffix }}
        run: |
          echo "### \`${{ steps.get-image-name.outputs.name }}/${{ matrix.image_suffix }}:${{ env.IMAGE_TAG }}\` built and published" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with: \`docker pull ${{ steps.get-image-name.outputs.name }}/${{ matrix.image_suffix }}:${{ env.IMAGE_TAG }}\`" \
            >> "$GITHUB_STEP_SUMMARY"
